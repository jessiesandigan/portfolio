<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jessie Sandigan</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #fff;
    color: #000;
    font-family: Arial;
letter-spacing: normal;
  }
  a { color: inherit; }

  /* ---------- SHARED CONTAINER ---------- */
  /* Every section of the page uses this for consistent left/right alignment */
  .container {
    width: 90%;
    max-width: 1200px;
    margin: 0 auto;
    padding-left: 1.5rem;
    padding-right: 1.5rem;
  }

  /* ---------- HEADER ---------- */
  .my-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #fff;
    
  }
  .header-inner {
    position: relative;
    margin: 0 auto;
    padding-top: 5rem;
    padding-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-name {
    font-size: 16px;
    font-weight: bold;
    color: #000;
    text-decoration: none;
    letter-spacing: normal;
  }
  .nav-links {
    display: flex;
    gap: 50px;
  }
  .nav-links a {
    font-size: 14px;
    color: #000;
    text-decoration: none;
letter-spacing: normal;
  }

.nav-links a[href="index.html"] {
  color: #000;
}

.nav-links a[href="profile.html"],
.nav-links a[href="contact.html"] {
  color: #999;
}
  .nav-links a:hover {
    color: #000;
    
  }
  .menu-toggle {
    display: none;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #000;
    padding: 0;
    line-height: 1;
  }

  @media (max-width: 480px) {
    .header-inner {
      flex-direction: row;
      align-items: center;
      padding-top: 1.5rem;
    }
    .menu-toggle {
      display: block;
    }
    .nav-links {
      display: flex;
      flex-direction: column;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #eee;
      padding: 0 1.5rem;
      gap: 16px;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.3s ease, padding 0.35s ease;
    }
    .nav-links.open {
      max-height: 200px;
      opacity: 1;
      padding: 1rem 1.5rem;
    }
  }

  /* ---------- SECTIONS ---------- */
  section {
    margin: 0 auto;
    padding-top: 0rem;
    padding-bottom: 20rem;
scroll-margin-top: 140px;
  }
  h2.section-title {
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 1.5rem;
    font-weight: normal;
  }

  /* ---------- WORKS GRID ---------- */
  .works-grid {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .hover-box {
    position: relative;
    overflow: hidden;
    border-radius: 0px;
    background: #fff;
    width: 100%;
    max-width: 650px;
  }
  .hover-box img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    aspect-ratio: 4/5;
  }

  .hover-box {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .hover-box.in-view {
    opacity: 1;
    transform: translateY(0);
  }

</style>
</head>
<body>

  <!-- ============ HEADER ============ -->
  <div class="my-header">
    <div class="header-inner container">
      <a href="index.html" class="site-name">Jessie Sandigan</a>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">&#9776;</button>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">works</a>
        <a href="profile.html">profile</a>
        <a href="contact.html">contact</a>
      </nav>
    </div>
  </div>

  <!-- ============ WORKS ============ -->
  <section id="works" class="container">
    <h2 class="section-title"></h2>
    <div class="works-grid">

      <div class="hover-box" data-artwork>
        <img src="god_descending_purification.jpg" alt="God Descending Purification" />
      </div>

      <div class="hover-box" data-artwork>
        <img src="and_we_worshipped_the_beast.jpg" alt="And We Worshipped the Beast" />
      </div>

	<div class="hover-box" data-artwork>
        <img src="savior.jpg" alt="Savior" />
      </div>

      </div>
      <!--
        To add more artworks, copy one whole block above (from
        <div class="hover-box" data-artwork> down to its closing </div>)
        and edit the image src + label text.
      -->

    </div>
  </section>

<script>
  const menuToggle = document.getElementById('menuToggle');
  const navLinks = document.getElementById('navLinks');

  menuToggle.addEventListener('click', function() {
    const isOpen = navLinks.classList.toggle('open');
    menuToggle.innerHTML = isOpen ? '&#10005;' : '&#9776;';
  });

  // Fade artwork images in as they scroll into view
  const artworkObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        artworkObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.hover-box').forEach(function(box) {
    artworkObserver.observe(box);
  });
</script>

</body>
</html>
