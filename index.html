<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jessie Sandigan</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #fff;
    color: #000;
    font-family: Arial;
letter-spacing: normal;
  }
  a { color: inherit; }

  /* ---------- SHARED CONTAINER ---------- */
  /* Every section of the page uses this for consistent left/right alignment */
  .container {
    max-width: 60%;
    margin: 0 auto;
    padding-left: 1.5rem;
    padding-right: 1.5rem;
  }

  /* ---------- HEADER ---------- */
  .my-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #fff;
    
  }
  .header-inner {
    margin: 0 auto;
    padding-top: 5rem;
    padding-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-name {
    font-size: 16px;
    font-weight: bold;
    color: #000;
    text-decoration: none;
    letter-spacing: normal;
  }
  .nav-links {
    display: flex;
    gap: 50px;
  }
  .nav-links a {
    font-size: 14px;
    color: #000;
    text-decoration: none;
letter-spacing: normal;
  }

.nav-links a[href="index.html"] {
  color: #000;
}

.nav-links a[href="profile.html"],
.nav-links a[href="contact.html"] {
  color: #999;
}
  .nav-links a:hover {
    color: #000;
    
  }
  @media (max-width: 480px) {
    .header-inner {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .nav-links { gap: 16px; }
  }

  /* ---------- SECTIONS ---------- */
  section {
    margin: 0 auto;
    padding-top: 0rem;
    padding-bottom: 20rem;
scroll-margin-top: 140px;
  }
  h2.section-title {
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 1.5rem;
    font-weight: normal;
  }

  /* ---------- WORKS GRID ---------- */
  .works-grid {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .hover-box {
    position: relative;
    overflow: hidden;
    border-radius: 0px;
    background: #fff;
    width: 100%;
    max-width: 650px;
  }
  .hover-box img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    aspect-ratio: 4/5;
  }

</style>
</head>
<body>

  <!-- ============ HEADER ============ -->
  <div class="my-header">
    <div class="header-inner container">
      <a href="index.html" class="site-name">Jessie Sandigan</a>
      <nav class="nav-links">
        <a href="index.html">works</a>
        <a href="profile.html">profile</a>
        <a href="contact.html">contact</a>
      </nav>
    </div>
  </div>

  <!-- ============ WORKS ============ -->
  <section id="works" class="container">
    <h2 class="section-title"></h2>
    <div class="works-grid">

      <div class="hover-box" data-artwork>
        <img src="https://i.imgur.com/KDdvU3a.jpeg" alt="God Descending Purification" />
      </div>

      <div class="hover-box" data-artwork>
        <img src="https://i.imgur.com/EyCVeUr.jpeg" alt="And We Worshipped the Beast" />
      </div>

	<div class="hover-box" data-artwork>
        <img src="https://i.imgur.com/IF5mMtr.jpeg" alt="Savior" />
      </div>

      </div>
      <!--
        To add more artworks, copy one whole block above (from
        <div class="hover-box" data-artwork> down to its closing </div>)
        and edit the image src + label text.
      -->

    </div>
  </section>

</body>
</html>
